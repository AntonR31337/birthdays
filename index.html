<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Ввод даты рождения</title>
    <link rel="stylesheet" href="./index.css" />
    <script src="./showBirthday.js"></script>
  </head>
  <body>
    <h2>Введите дату рождения</h2>
    <div class="form-group">
      <label>День (1-31):</label>
      <input type="number" id="day" min="1" max="31" placeholder="День" />
    </div>
    <div class="form-group">
      <label>Месяц (1-12):</label>
      <input type="number" id="month" min="1" max="12" placeholder="Месяц" />
    </div>
    <div class="form-group">
      <label>Год:</label>
      <input type="number" id="year" min="1900" max="2026" placeholder="Год" />
    </div>
    <button onclick="showBirthday()">Показать дату</button>
    <div id="result"></div>
  </body>
</html>
